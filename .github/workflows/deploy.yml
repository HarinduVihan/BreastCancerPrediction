name: Train, Export, and Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to your default branch name if different (e.g., master)

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r BreastCancerPrediction/requirements.txt

      - name: Train Model & Generate Metadata
        run: |
          python BreastCancerPrediction/train_model.py

      - name: Export Random Forest to JSON & Verify
        run: |
          python BreastCancerPrediction/export_model.py

      - name: Compile Static Website Bundle
        run: |
          mkdir -p build
          cp BreastCancerPrediction/templates/index.html build/index.html
          cp -r BreastCancerPrediction/static build/static

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Static Assets to Pages Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
